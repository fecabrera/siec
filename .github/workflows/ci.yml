name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pipenv

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Run tests with coverage
        run: |
          pipenv run coverage run -m pytest -v
          echo "# Coverage Report (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          pipenv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pipenv

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      # ubuntu-latest (24.04) has no libmpdec package - Ubuntu dropped
      # mpdecimal after 22.04 and only reintroduced it in 25.10 - so the
      # library builds from the upstream release instead
      - name: Install libmpdec
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -LO https://www.bytereef.org/software/mpdecimal/releases/mpdecimal-4.0.1.tar.gz
          echo "96d33abb4bb0070c7be0fed4246cd38416188325f820468214471938545b1ac8  mpdecimal-4.0.1.tar.gz" | sha256sum -c
          tar xf mpdecimal-4.0.1.tar.gz
          cd mpdecimal-4.0.1
          ./configure
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig

      - name: Install libmpdec
        if: matrix.os == 'macos-latest'
        run: brew install mpdecimal

      - name: Build Sie
        run: |
          git clone https://github.com/cktan/tomlc17.git
          chmod a+x build.sh
          ./build.sh

      - name: Upload Sie
        uses: actions/upload-artifact@v4
        with:
          name: sie
          path: dist/
